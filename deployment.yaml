apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: fraud-api

  template:
    metadata:
      labels:
        app: fraud-api

    spec:
      containers:
      - name: fraud-api

        image: fraud-api:latest

        ports:
        - containerPort: 8000